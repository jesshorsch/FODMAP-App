<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reizmagen">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<title>Reizmagen & FODMAP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--s:#171717;--s2:#1e1e1e;--b:#2a2a2a;
  --t:#e5e5e5;--m:#666;
  --g:#4ade80;--gd:rgba(74,222,128,.1);--gb:rgba(74,222,128,.25);
  --y:#fbbf24;--yd:rgba(251,191,36,.1);--yb:rgba(251,191,36,.25);
  --r:#f87171;--rd:rgba(248,113,113,.1);--rb:rgba(248,113,113,.25);
  --a:#818cf8;
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:var(--t);min-height:100vh;font-size:14px}
body.light{
  --bg:#f5f5f0;--s:#fff;--s2:#ebebeb;--b:#d4d4ce;
  --t:#1a1a18;--m:#777;
  --g:#16a34a;--gd:rgba(22,163,74,.1);--gb:rgba(22,163,74,.3);
  --y:#b45309;--yd:rgba(180,83,9,.1);--yb:rgba(180,83,9,.3);
  --r:#dc2626;--rd:rgba(220,38,38,.1);--rb:rgba(220,38,38,.3);
  --a:#4f46e5;
}
header{display:flex;align-items:center;gap:.65rem;padding:.6rem 1rem;border-bottom:1px solid var(--b);background:var(--s);position:sticky;top:0;z-index:10}
.logo{font-size:.75rem;font-weight:500;color:var(--m);white-space:nowrap}
.logo b{color:var(--t);font-weight:500}
.sw{position:relative;flex:1;max-width:320px}
.sw svg{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--m);pointer-events:none}
#search{width:100%;padding:.4rem 1.8rem .4rem 1.9rem;font-family:inherit;font-size:16px;background:var(--s2);border:1px solid var(--b);border-radius:5px;color:var(--t);outline:none}
#search:focus{border-color:var(--m)}
#search::placeholder{color:var(--m)}
#clearBtn{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--m);cursor:pointer;font-size:.75rem;padding:.1rem .2rem;display:none}
#clearBtn.vis{display:block}
.icon-btn{background:none;border:1px solid var(--b);border-radius:6px;padding:.28rem .5rem;cursor:pointer;color:var(--m);font-size:.82rem;line-height:1;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{color:var(--t);border-color:var(--m)}
.ctrl{display:flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-bottom:1px solid var(--b);flex-wrap:wrap;background:var(--s)}
.lbl{font-size:.62rem;color:var(--m)}
.pill{padding:.25rem .6rem;font-family:inherit;font-size:.68rem;border:1px solid var(--b);border-radius:20px;background:none;color:var(--m);cursor:pointer;white-space:nowrap}
.pill:hover{color:var(--t);border-color:var(--m)}
.pa{background:var(--t)!important;color:var(--bg)!important;border-color:var(--t)!important}
.pg{background:var(--gd)!important;color:var(--g)!important;border-color:var(--gb)!important}
.py{background:var(--yd)!important;color:var(--y)!important;border-color:var(--yb)!important}
.pr{background:var(--rd)!important;color:var(--r)!important;border-color:var(--rb)!important}
.pm{background:rgba(129,140,248,.1)!important;color:var(--a)!important;border-color:rgba(129,140,248,.3)!important}
.sep{width:1px;height:14px;background:var(--b)}
#cnt{font-size:.65rem;color:var(--m);margin-left:auto}
.score-row{display:flex;align-items:center;gap:.45rem;margin-top:.45rem}
.score-bar-wrap{flex:1;height:4px;background:var(--b);border-radius:2px;overflow:hidden}
.score-bar{height:100%;border-radius:2px}
.score-num{font-size:.68rem;font-weight:500;white-space:nowrap;min-width:2.2rem;text-align:right}
.sc-g{background:var(--g);color:var(--g)}.sc-y{background:var(--y);color:var(--y)}.sc-r{background:var(--r);color:var(--r)}
.m-score{display:flex;align-items:center;gap:.6rem;margin-top:.6rem}
.m-score-bar-wrap{flex:1;height:6px;background:var(--b);border-radius:3px;overflow:hidden}
.m-score-bar{height:100%;border-radius:3px}
.m-score-num{font-size:1.1rem;font-weight:500}
.cats{display:flex;gap:.3rem;padding:.45rem 1rem;border-bottom:1px solid var(--b);overflow-x:auto;background:var(--bg)}
.cats::-webkit-scrollbar{display:none}
.cat{padding:.18rem .5rem;font-family:inherit;font-size:.63rem;border:1px solid var(--b);border-radius:4px;background:none;color:var(--m);cursor:pointer;white-space:nowrap}
.cat:hover,.cat.on{background:var(--s2);color:var(--t);border-color:var(--m)}
main{max-width:1100px;margin:0 auto;padding:.85rem 1rem 4rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.5rem}
.card{background:var(--s);border:1px solid var(--b);border-radius:7px;padding:.7rem .8rem;cursor:pointer;position:relative;overflow:hidden}
.card:hover{border-color:var(--m)}
.bar{position:absolute;left:0;top:0;bottom:0;width:2px}
.bg{background:var(--g)}.by{background:var(--y)}.br{background:var(--r)}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:.4rem}
.cn{font-size:.8rem;font-weight:500;line-height:1.3;color:var(--t)}
.bgs{display:flex;flex-direction:column;gap:.12rem;align-items:flex-end;flex-shrink:0}
.badge{padding:.08rem .32rem;border-radius:3px;font-size:.56rem;font-weight:500;letter-spacing:.03em;white-space:nowrap}
.bdg{background:var(--gd);color:var(--g);border:1px solid var(--gb)}
.bdy{background:var(--yd);color:var(--y);border:1px solid var(--yb)}
.bdr{background:var(--rd);color:var(--r);border:1px solid var(--rb)}
.ccat{margin-top:.18rem;font-size:.6rem;color:var(--m)}
.chips{margin-top:.35rem;display:flex;flex-wrap:wrap;gap:.18rem}
.chip{padding:.08rem .32rem;border-radius:3px;font-size:.58rem;border:1px solid}
.cF{background:rgba(129,140,248,.07);color:var(--a);border-color:rgba(129,140,248,.2)}
.cS{background:rgba(251,146,60,.07);color:#fb923c;border-color:rgba(251,146,60,.2)}
.cFt{background:rgba(168,85,247,.07);color:#c084fc;border-color:rgba(168,85,247,.2)}
.cSc{background:rgba(239,68,68,.07);color:#f87171;border-color:rgba(239,68,68,.2)}
.cH{background:rgba(20,184,166,.07);color:#2dd4bf;border-color:rgba(20,184,166,.2)}
.cB{background:rgba(107,114,128,.07);color:#9ca3af;border-color:rgba(107,114,128,.2)}
.cSt{background:rgba(234,179,8,.07);color:#eab308;border-color:rgba(234,179,8,.25)}
.cnote{margin-top:.4rem;font-size:.66rem;color:var(--m);line-height:1.45}
.nores{grid-column:1/-1;padding:3rem;text-align:center;color:var(--m);font-size:.78rem}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:1rem}
.ov.open{display:flex}
.modal{background:var(--s);border:1px solid var(--b);border-radius:10px;max-width:420px;width:100%;padding:1.3rem;position:relative;animation:pop .15s ease;max-height:90vh;overflow-y:auto}
@keyframes pop{from{transform:scale(.97);opacity:0}to{transform:none;opacity:1}}
.mc{position:absolute;top:.75rem;right:.75rem;background:var(--s2);border:1px solid var(--b);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--m);font-size:.72rem}
.mc:hover{color:var(--t)}
.mn{font-size:1rem;font-weight:500;color:var(--t);margin-bottom:.12rem;padding-right:2rem}
.mcat{font-size:.62rem;color:var(--m);margin-bottom:1rem}
.mdiv{height:1px;background:var(--b);margin:.75rem 0}
.ml{font-size:.58rem;text-transform:uppercase;letter-spacing:.09em;color:var(--m);margin-bottom:.28rem}
.mt{font-size:.76rem;line-height:1.6;color:var(--t)}
.rtg{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.rb{padding:.5rem .65rem;border-radius:6px;border:1px solid}
.rb.green{background:var(--gd);border-color:var(--gb)}.rb.yellow{background:var(--yd);border-color:var(--yb)}.rb.red{background:var(--rd);border-color:var(--rb)}
.rbl{font-size:.54rem;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.12rem}
.rb.green .rbl{color:var(--g)}.rb.yellow .rbl{color:var(--y)}.rb.red .rbl{color:var(--r)}
.rbv{font-size:.82rem;font-weight:500}
.rb.green .rbv{color:var(--g)}.rb.yellow .rbv{color:var(--y)}.rb.red .rbv{color:var(--r)}
.tip{margin-top:.65rem;padding:.55rem .7rem;background:rgba(129,140,248,.07);border:1px solid rgba(129,140,248,.15);border-radius:5px;font-size:.71rem;line-height:1.6;color:var(--a)}
.disc{margin-top:.8rem;font-size:.57rem;color:var(--m);line-height:1.6;padding-top:.75rem;border-top:1px solid var(--b)}
.alts{display:flex;flex-direction:column;gap:.35rem;margin-top:.3rem}
.alt-card{background:var(--s2);border:1px solid var(--b);border-radius:6px;padding:.5rem .65rem;cursor:pointer}
.alt-card:hover{border-color:var(--m)}
.alt-top{display:flex;justify-content:space-between;align-items:center;gap:.4rem}
.alt-name{font-size:.76rem;font-weight:500;color:var(--t)}
/* settings */
.sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;align-items:flex-end;justify-content:center}
.sov.open{display:flex}
.ssheet{background:var(--s);border-radius:14px 14px 0 0;width:100%;max-width:520px;padding:1.4rem 1.4rem 2.5rem;animation:slideUp .2s ease;max-height:85vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.shd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
.stitle{font-size:.85rem;font-weight:500;color:var(--t)}
.sclose{background:var(--s2);border:1px solid var(--b);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--m);font-size:.75rem}
.ssec{margin-bottom:1.2rem}
.ssec-title{font-size:.6rem;text-transform:uppercase;letter-spacing:.09em;color:var(--m);margin-bottom:.6rem}
.theme-row{display:flex;gap:.4rem}
.theme-btn{flex:1;padding:.5rem;font-family:inherit;font-size:.75rem;border:1px solid var(--b);border-radius:7px;background:none;color:var(--m);cursor:pointer;text-align:center}
.theme-btn.active{background:var(--s2);color:var(--t);border-color:var(--m)}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.ttog{display:flex;align-items:center;justify-content:space-between;padding:.5rem .7rem;border:1px solid var(--b);border-radius:7px;cursor:pointer}
.ttog.on{border-color:var(--r);background:var(--rd)}
.ttog-lbl{font-size:.73rem;color:var(--t)}
.ttog-sub{font-size:.58rem;color:var(--m)}
.tswitch{width:28px;height:16px;border-radius:8px;background:var(--b);position:relative;flex-shrink:0}
.ttog.on .tswitch{background:var(--r)}
.tswitch::after{content:"";position:absolute;width:10px;height:10px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .15s}
.ttog.on .tswitch::after{left:15px}

.fmap-tag{display:inline-flex;align-items:center;padding:.07rem .3rem;border-radius:3px;font-size:.57rem;border:1px solid;margin:.08rem}
.fmap-tag.my{background:var(--rd)!important;color:var(--r)!important;border-color:var(--rb)!important;font-weight:600}
.fmap-tag.ok{background:rgba(129,140,248,.07);color:var(--a);border-color:rgba(129,140,248,.2)}
.fodmap-filter-row{display:flex;flex-wrap:wrap;gap:.3rem}
.fmpill{padding:.22rem .55rem;font-family:inherit;font-size:.64rem;border:1px solid var(--b);border-radius:16px;background:none;color:var(--m);cursor:pointer;white-space:nowrap}
.fmpill:hover{color:var(--t);border-color:var(--m)}
.fmpill.on{background:var(--rd);color:var(--r);border-color:var(--rb)}

@media(max-width:600px){
  .sw{max-width:none}
  .lbl{display:none}
  .sep{display:none}
  main{padding:.65rem .75rem 4rem}
  .grid{grid-template-columns:1fr 1fr;gap:.4rem}
  .card{padding:.6rem .65rem}
  .cn{font-size:.75rem}
  .badge{font-size:.5rem}
  .cnote{font-size:.62rem}
}
@media(max-width:360px){.grid{grid-template-columns:1fr}}
</style>
</head>

<main><div class="grid" id="grid"></div></main>

  <div class="modal">
    <button class="mc" id="modalClose">&#x2715;</button>
    <div id="mcon"></div>
  </div>
</div>

      <span class="stitle">Einstellungen</span>
      <button class="sclose" id="settClose">&#x2715;</button>

      <div class="ssec-title">Design</div>
      <div class="theme-row">
        <button class="theme-btn active" id="tbDark">&#x1F319; Dark</button>
        <button class="theme-btn" id="tbLight">&#x2600;&#xFE0F; Light</button>
      </div>
    </div>
    <div class="ssec">
      <div class="ssec-title">Meine Reizmagen-Trigger</div>

    <div class="ssec">

    <div class="ssec" style="margin-top:.5rem">
      <div class="ssec-title">Uber die App</div>
      <div style="font-size:.68rem;color:var(--m);line-height:1.7">Daten: Monash University. Barcode: Open Food Facts. Kein Ersatz fur arztliche Beratung.</div>

  </div>
</div>

<script>

function setTheme(t){
  darkMode=(t==="dark");
  document.body.classList.toggle("light",!darkMode);
  document.getElementById("tbDark").classList.toggle("active",darkMode);
  document.getElementById("tbLight").classList.toggle("active",!darkMode);
  localStorage.setItem("theme",t);
}
(function(){if(localStorage.getItem("theme")==="light")setTheme("light");})();

function getS(f){
  if(mode==="fodmap")return f.fodmap;
  if(mode==="magen")return f.magen;
  var r={green:0,yellow:1,red:2};
  return r[f.fodmap]>=r[f.magen]?f.fodmap:f.magen;
}
function scCls(s){return s>=7?"sc-g":s>=4?"sc-y":"sc-r";}
function chip(t){return "<span class=\"chip "+TC[t]+"\">"+TL[t]+"</span>";}
function sBar(s){var c=scCls(s);return "<div class=\"score-row\"><div class=\"score-bar-wrap\"><div class=\"score-bar "+c+"\" style=\"width:"+(s*10)+"%\"></div></div><span class=\"score-num "+c+"\">"+s+"/10</span></div>";}
function mBar(s){var c=scCls(s);return "<div class=\"m-score\"><div class=\"m-score-bar-wrap\"><div class=\"m-score-bar "+c+"\" style=\"width:"+(s*10)+"%\"></div></div><span class=\"m-score-num "+c+"\">"+s+"<span style=\"font-size:.6rem;color:var(--m);font-weight:400\">/10</span></span></div>";}
function hl(t){if(!sq)return t;return t.replace(new RegExp("("+sq.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),"<mark style=\"background:rgba(129,140,248,.22);border-radius:2px;padding:0 1px\">$1</mark>");}

function buildGrids(){
  var tg=document.getElementById("trigGrid");
  var html="";
  for(var i=0;i<ALL_TRIGS.length;i++){
    var t=ALL_TRIGS[i];var on=myTrigs.indexOf(t)>=0;
    html+="<div class=\"ttog"+(on?" on":"")+" \" data-trig=\""+t+"\" id=\"tt_"+t+"\"><div><div class=\"ttog-lbl\">"+TRIG_N[t]+"</div><div class=\"ttog-sub\">"+TRIG_S[t]+"</div></div><div class=\"tswitch\"></div></div>";
  }
  tg.innerHTML=html;
  tg.querySelectorAll(".ttog").forEach(function(el){el.addEventListener("click",function(){var t=this.dataset.trig;var idx=myTrigs.indexOf(t);if(idx>=0)myTrigs.splice(idx,1);else myTrigs.push(t);localStorage.setItem("myTrigs",JSON.stringify(myTrigs));this.classList.toggle("on",myTrigs.indexOf(t)>=0);render();});});
  var fg=document.getElementById("fodmapGrid");
  html="";
  for(var j=0;j<ALL_FMAPS.length;j++){
    var f=ALL_FMAPS[j];var on2=myFmaps.indexOf(f)>=0;
    html+="<div class=\"ttog"+(on2?" on":"")+" \" data-fm=\""+f+"\" id=\"ff_"+f+"\"><div><div class=\"ttog-lbl\">"+f+"</div><div class=\"ttog-sub\">"+FMAP_D[f]+"</div></div><div class=\"tswitch\"></div></div>";
  }
  fg.innerHTML=html;
  fg.querySelectorAll(".ttog").forEach(function(el){el.addEventListener("click",function(){var f=this.dataset.fm;var idx=myFmaps.indexOf(f);if(idx>=0)myFmaps.splice(idx,1);else myFmaps.push(f);localStorage.setItem("myFmaps",JSON.stringify(myFmaps));this.classList.toggle("on",myFmaps.indexOf(f)>=0);render();});});
}

// Render
function render(){
  var items=db.filter(function(f){
    var s=getS(f);
    var fmOk=fmapFilt.length===0||((f.fodmaps||[]).some(function(x){return fmapFilt.indexOf(x)>=0;}));return fmOk&&(filt==="all"||s===filt)&&(cat==="all"||f.cat===cat)&&(!sq||(f.name.toLowerCase().indexOf(sq)>=0)||(f.cat.toLowerCase().indexOf(sq)>=0)||((f.fodmaps||[]).join(" ").toLowerCase().indexOf(sq)>=0));
  });
  if(sortByScore)items=items.slice().sort(function(a,b){return b.score-a.score;});
  document.getElementById("cnt").textContent=items.length+" Eintrage";
  var g=document.getElementById("grid");
  if(!items.length){g.innerHTML="<div class=\"nores\">Nichts gefunden.</div>";return;}
  var nk=mode==="magen"?"magenNote":"note";
  var html="";
  for(var i=0;i<items.length;i++){
    var f=items[i];var s=getS(f);
    var cHtml="";for(var ci=0;ci<(f.triggers||[]).length;ci++)cHtml+=chip(f.triggers[ci]);
    var fw="";
    if(f.fodmaps&&f.fodmaps.length){for(var fi=0;fi<f.fodmaps.length;fi++){var fm=f.fodmaps[fi];var isM=myFmaps.indexOf(fm)>=0||fmapFilt.indexOf(fm)>=0;fw+="<span class=\"fmap-tag "+(isM?"my":"ok")+"\">"+(isM?"⚠ ":"")+fm+"</span>";}}
    html+="<div class=\"card\" data-i=\""+db.indexOf(f)+"\"><div class=\"bar b"+s[0]+"\"></div><div class=\"ctop\"><div class=\"cn\">"+hl(f.name)+"</div><div class=\"bgs\"><span class=\"badge "+BC[f.fodmap]+"\">"+SI[f.fodmap]+" FDM</span><span class=\"badge "+BC[f.magen]+"\">"+SI[f.magen]+" Mag</span></div></div><div class=\"ccat\">"+f.cat+"</div>"+sBar(f.score)+(cHtml?"<div class=\"chips\">"+cHtml+"</div>":"")+(fw?"<div class=\"chips\" style=\"margin-top:.2rem\">"+fw+"</div>":"")+"<div class=\"cnote\">"+f[nk]+"</div></div>";
  }
  g.innerHTML=html;
  g.querySelectorAll(".card").forEach(function(el){el.addEventListener("click",function(){oM(parseInt(this.dataset.i));});});
}

// Alternatives
function findAlts(f){
  var r={green:0,yellow:1,red:2},fSc=r[f.fodmap]+r[f.magen],out=[];
  for(var i=0;i<db.length;i++){var a=db[i];if(a===f||r[a.fodmap]>r[f.fodmap]||r[a.magen]>r[f.magen]||r[a.fodmap]+r[a.magen]>=fSc)continue;var sc=0;if(a.cat===f.cat)sc+=4;for(var ti=0;ti<(f.triggers||[]).length;ti++){if((a.triggers||[]).indexOf(f.triggers[ti])<0)sc+=1;}if(r[f.fodmap]>0&&r[a.fodmap]<r[f.fodmap])sc+=2;if(r[f.magen]>0&&r[a.magen]<r[f.magen])sc+=2;out.push({a:a,sc:sc});}
  out.sort(function(x,y){return y.sc-x.sc;});return out.slice(0,4).map(function(x){return x.a;});
}

function oM(i){
  var f=db[i];
  var alts=findAlts(f);
  var altHtml="";
  if(alts.length){
    altHtml="<div class=\"mdiv\"></div><div class=\"ml\">Alternativen</div><div class=\"alts\">";
    for(var ai=0;ai<alts.length;ai++){
      var a=alts[ai];var ach="";for(var ati=0;ati<(a.triggers||[]).length;ati++)ach+=chip(a.triggers[ati]);
      altHtml+="<div class=\"alt-card\" data-ai=\""+db.indexOf(a)+"\"><div class=\"alt-top\"><span class=\"alt-name\">"+a.name+"</span><span style=\"display:flex;gap:.2rem;align-items:center\"><span class=\"score-num "+scCls(a.score)+"\" style=\"font-size:.62rem\">"+a.score+"</span><span class=\"badge "+BC[a.fodmap]+"\">"+SI[a.fodmap]+" FDM</span><span class=\"badge "+BC[a.magen]+"\">"+SI[a.magen]+" Mag</span></span></div>"+(ach?"<div class=\"chips\" style=\"margin-top:.25rem\">"+ach+"</div>":"")+"</div>";
    }
    altHtml+="</div>";
  }
  var fd=f.fodmaps&&f.fodmaps.length?"<div class=\"mdiv\"></div><div class=\"ml\">Enthaltene FODMAPs</div><div class=\"chips\" style=\"margin-top:.3rem\">"+f.fodmaps.map(function(fm){var my=myFmaps.indexOf(fm)>=0;return "<span class=\"chip cF\"" +(my?" style=\"border-color:var(--r);background:var(--rd);color:var(--r)\"":"")+">"+fm+(my?" !":"")+"</span>";}).join("")+"</div>":"<div class=\"mdiv\"></div><div class=\"ml\">FODMAPs</div><div class=\"mt\" style=\"color:var(--g);font-size:.75rem\">v Keine FODMAP-Ausloeser</div>";
  var td=f.triggers&&f.triggers.length?"<div class=\"mdiv\"></div><div class=\"ml\">Reizmagen-Trigger</div><div class=\"chips\" style=\"margin-top:.3rem\">"+f.triggers.map(chip).join("")+"</div>":"<div class=\"mdiv\"></div><div class=\"ml\">Trigger</div><div class=\"mt\" style=\"color:var(--g);font-size:.75rem\">v Keine bekannten Trigger</div>";
  document.getElementById("mcon").innerHTML="<div class=\"mn\">"+f.name+"</div><div class=\"mcat\">"+f.cat+" - Portion: "+f.portion+"</div><div class=\"ml\" style=\"margin-top:.75rem\">Gesamtbewertung</div>"+mBar(f.score)+"<div class=\"mdiv\"></div><div class=\"ml\">Einzelbewertung</div><div class=\"rtg\"><div class=\"rb "+f.fodmap+"\"><div class=\"rbl\">FODMAP</div><div class=\"rbv\">"+SI[f.fodmap]+" "+SL[f.fodmap]+"</div></div><div class=\"rb "+f.magen+"\"><div class=\"rbl\">Reizmagen</div><div class=\"rbv\">"+SI[f.magen]+" "+SL[f.magen]+"</div></div></div>"+fd+td+"<div class=\"mdiv\"></div><div class=\"ml\">FODMAP-Hinweis</div><div class=\"mt\" style=\"margin-top:.3rem\">"+f.note+"</div><div class=\"tip\" style=\"margin-top:.65rem\">"+f.magenNote+"</div>"+altHtml+"<div class=\"disc\">Monash University + Reizmagen-Empfehlungen. Kein Ersatz fur arztliche Beratung.</div>";
  document.getElementById("ov").classList.add("open");
  document.getElementById("mcon").querySelectorAll(".alt-card").forEach(function(el){el.addEventListener("click",function(){oM(parseInt(this.dataset.ai));});});
}

render();
</script>
